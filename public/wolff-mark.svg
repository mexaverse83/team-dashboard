  <rect x="2" y="2" width="60" height="60" rx="17" fill="url(#wolff-bg)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="16.25" stroke="#F5EEDC" stroke-opacity=".16" stroke-width="1.5"/>

